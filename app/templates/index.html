<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Culture Notebook</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
</head>
<body>

<div id="sidebar">
    <h1>Digital Culture Notebook</h1>

    <!-- Notebook selector -->
    <div id="notebook-selector">
        <div class="section-label">Notebook</div>
        <div id="notebook-bar">
            <select id="notebook-dropdown"></select>
            <button onclick="addNotebook()" title="New notebook">+</button>
            <button onclick="renameNotebook()" title="Rename notebook">✏</button>
            <button onclick="deleteNotebook()" title="Delete notebook">✕</button>
        </div>
    </div>

    <div id="search-box">
        <input type="text" id="search-input" placeholder="Search notes & titles...">
    </div>

    <div class="section-label">Chapters</div>
    <ul id="chapter-list"></ul>

    <div id="add-chapter-form">
        <input type="text" id="new-chapter-name" placeholder="New chapter...">
        <button onclick="addChapter()">+</button>
    </div>

    <div id="sidebar-bulk">
        <button class="btn-bulk" onclick="showBulkDownload()">Bulk Download</button>
    </div>
</div>

<div id="main">
    <!-- Welcome state -->
    <div id="welcome">
        <div class="empty-state">
            <h3>Welcome to Digital Culture Notebook</h3>
            <p>Select a notebook, create a chapter, then add videos with notes.</p>
        </div>
    </div>

    <!-- Chapter view -->
    <div id="chapter-view" style="display:none">
        <div id="toolbar">
            <h2 id="chapter-title"></h2>
            <div class="toolbar-actions">
                <button class="btn btn-secondary" id="transcribe-all-btn" onclick="transcribeAll()">Transcribe All</button>
            </div>
        </div>

        <div id="content">
            <!-- Chapter-level notes -->
            <div id="chapter-notes-section">
                <h3>Chapter Notes</h3>
                <div id="chapter-notes-editor"></div>
                <div class="save-row">
                    <button class="btn btn-primary" onclick="saveChapterNotes()">Save Notes</button>
                    <span id="chapter-notes-status" class="save-status"></span>
                </div>
            </div>

            <div id="add-entry-form">
                <h3>Add Entry</h3>
                <div class="form-row">
                    <input type="text" id="entry-url" placeholder="Paste video URL (YouTube, TikTok, Instagram)...">
                </div>
                <textarea id="entry-notes" placeholder="Initial notes (optional, you can edit later with rich text)..."></textarea>
                <div style="margin-top:12px">
                    <button class="btn btn-primary" id="add-entry-btn" onclick="addEntry()">Download &amp; Save</button>
                </div>
            </div>

            <div id="entries-list"></div>
        </div>
    </div>

    <!-- Bulk download view -->
    <div id="bulk-view" style="display:none">
        <div id="toolbar">
            <h2>Bulk Download</h2>
        </div>
        <div id="content" style="overflow-y:auto; flex:1; padding:24px;">
            <div id="add-entry-form">
                <h3>Download Videos to a Folder</h3>
                <div class="form-row">
                    <input type="text" id="bulk-folder" placeholder="Folder name (e.g. 'TikTok March 2026')">
                </div>
                <textarea id="bulk-urls" rows="8" placeholder="Paste video URLs here, one per line..."></textarea>
                <div style="margin-top:12px; display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
                    <label style="font-size:13px; color:#666; display:flex; align-items:center; gap:6px;">
                        <input type="checkbox" id="bulk-transcribe"> Transcribe after download
                    </label>
                </div>
                <div style="margin-top:12px">
                    <button class="btn btn-primary" id="bulk-download-btn" onclick="startBulkDownload()">Download All</button>
                </div>
                <div id="bulk-progress" style="margin-top:16px; font-size:13px; color:#666;"></div>
            </div>

            <!-- Existing bulk folders -->
            <div id="bulk-folders-section" style="margin-top:24px;">
                <h3 style="margin-bottom:12px; font-size:15px;">Downloaded Folders</h3>
                <div id="bulk-folders-list"></div>
            </div>

            <!-- Folder contents viewer -->
            <div id="bulk-folder-contents" style="display:none; margin-top:24px;">
                <h3 id="bulk-folder-title" style="margin-bottom:12px; font-size:15px;"></h3>
                <div style="margin-bottom:12px;">
                    <button class="btn btn-secondary" onclick="transcribeAllBulk()">Transcribe All</button>
                </div>
                <div id="bulk-videos-list"></div>
            </div>
        </div>
    </div>

    <!-- Search results -->
    <div id="search-results" class="search-results" style="display:none"></div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
